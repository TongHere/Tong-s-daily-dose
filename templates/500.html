<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 · TongHere</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #fafbfc;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 56px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    .navbar a {
      text-decoration: none;
      color: inherit;
      font-size: 1.25rem;
      font-weight: 700;
    }
    .navbar a:hover {
      color: #1a73e8;
    }
    .error-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-container h1 {
      font-size: 1.75rem;
      margin: 0 0 0.75rem;
      color: #1a2a3a;
    }
    .error-container p {
      color: #555;
      margin: 0 0 1.5rem;
      max-width: 420px;
      line-height: 1.5;
    }
    .button {
      display: inline-block;
      padding: 0.6rem 1.25rem;
      background: #1a73e8;
      color: #fff !important;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.95rem;
    }
    .button:hover {
      background: #1557b0;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/">Hi, I'm Tong</a>
  </nav>
  <main class="error-container">
    <h1>500 — Something went wrong</h1>
    <p>Sorry, something went wrong on our end. Please try again later.</p>
    <a href="/" class="button">Return to home</a>
  </main>
</body>
</html>
